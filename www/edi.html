<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>
</head>
<body>
  <h1>Edit Profile</h1>
  <form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
    <br>
    <label for="graduation_year">Graduation Year</label>
    <input type="number" id="graduation_year" name="graduation_year" min="1900" max="2100" required>
    <br>
    <label for="field_of_study">Field of Study</label>
    <input type="text" id="field_of_study" name="field_of_study" required>
    <br>
    <label for="current_role">Current Role</label>
    <input type="text" id="current_role" name="current_role">
    <br>
    <label for="company">Company</label>
    <input type="text" id="company" name="company">
    <br>
    <label for="location">Location</label>
    <input type="text" id="location" name="location">
    <br>
    <label for="bio">Bio</label>
    <br>
    <textarea id="bio" name="bio" rows="4" cols="40"></textarea>
    <br>
    <label for="profile_picture">Profile Picture</label>
    <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
    <br>
<button type="submit">Save Changes</button>
  </form>
</body>
</html>
