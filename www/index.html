<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alumni Club</title>
</head>
<body>
  <h1>Alumni Club</h1>
  <p id="message">Loading...</p>

  <script>
    fetch('test.php')
      .then(res => res.json())
      .then(data => {
        document.getElementById('message').textContent = data.message;
      })
      .catch(() => {
        document.getElementById('message').textContent = 'Failed to reach server.';
      });
  </script>
</body>
</html>
