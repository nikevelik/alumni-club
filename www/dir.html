<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Directory</title>
</head>
<body>
  <h1>Alumni Directory</h1>
  <form action="" method="get">
    <label for="search">Search</label>
    <input type="text" id="search" name="search" placeholder="Name, company, role...">
    <br>
    <label for="graduation_year">Graduation Year</label>
    <input type="number" id="graduation_year" name="graduation_year" min="1900" max="2100">
    <br>
    <label for="field_of_study">Field of Study</label>
    <input type="text" id="field_of_study" name="field_of_study">
    <br>
    <label for="location">Location</label>
    <input type="text" id="location" name="location">
    <br>
    <button type="submit">Filter</button>
    <button type="reset">Clear</button>
  </form>
  <hr>
  <ul id="alumni_list">
    <li>
      <img src="" alt="Profile Picture">
      <a href="vie.html">Full Name</a>
      <span>Graduation Year</span>
      <span>Field of Study</span>
    </li>
  </ul>
</body>
</html>
