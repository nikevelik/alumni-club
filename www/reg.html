<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
</head>
<body>
  <h1>Create an Account</h1>
  <form>
    <label for="first_name">First Name</label>
    <input type="text" id="first_name" name="first_name" required>
    <br>
    <label for="last_name">Last Name</label>
    <input type="text" id="last_name" name="last_name" required>
    <br>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
    <br>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <br>
    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required>
    <br>
    <label for="graduation_year">Graduation Year</label>
    <input type="number" id="graduation_year" name="graduation_year" min="1900" max="2100" required>
    <br>
    <label for="field_of_study">Field of Study</label>
    <input type="text" id="field_of_study" name="field_of_study" required>
    <br>
    <label for="current_role">Current Role</label>
    <input type="text" id="current_role" name="current_role">
    <br>
    <label for="company">Company</label>
    <input type="text" id="company" name="company">
    <br>
    <label for="location">Location</label>
    <input type="text" id="location" name="location">
    <br>
    <label for="bio">Bio</label>
    <br>
    <textarea id="bio" name="bio" rows="4" cols="40"></textarea>
    <br>
    <label for="profile_picture">Profile Picture</label>
    <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
    <br>
    <label for="linkedin">LinkedIn URL</label>
    <input type="url" id="linkedin" name="linkedin">
    <br>
    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="log.html">Log in</a></p>
</body>
</html>
